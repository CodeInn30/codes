<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <title>Document</title>
</head>
<body>
    <div ng-app="myApp" ng-controller="myController">
        <div ng-init="name=''; quantity=0; rate=0; total=0">
            <div>
                <label>Enter a product name</label>
                <input type="text" ng-model="name">
            </div><br>
            <div>
                <label>Enter a quantity</label>
                <input type="number" ng-model="quantity">
            </div><br>
            <div>
                <label>Enter a rate</label>
                <input type="number" ng-model="rate">
            </div><br>

            <button ng-click="calculateTotalRate()">Calculate Rate</button>
            <p>Total Rate = {{ total }}</p>
        </div>
    </div>

    <script>
        var app = angular.module("myApp", []);
        app.controller("myController", function ($scope) {
            $scope.calculateTotalRate = function () {
                $scope.total = $scope.quantity * $scope.rate;
            }
        });
    </script>
</body>
</html>
