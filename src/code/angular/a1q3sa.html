<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <title>Document</title>
</head>

<body>
    <div ng-app="myApp" ng-controller="myCtrl">
        <h1>Addition Of Two Numbers</h1>
        <div ng-init="num1 = 0; num2 = 0; result = 0">
            <label for="num1">Number 1: </label>
            <input type="number" id="num1" ng-model="num1"><br>
            <label for="num2">Number 2: </label>
            <input type="number" id="num2" ng-model="num2"><br>
            <button ng-click="addNumbers()" ng-disable="!num1
|| !num2">Add Numbers</button><br>
            <p ng-show="result !== 0">Result: <span ngbind="result"></span></p>
        </div>
    </div>
    <script>
        var app = angular.module("myApp", []);
        app.controller("myCtrl", function ($scope) {
            $scope.addNumbers = function () {
                $scope.result = $scope.num1 + $scope.num2
            }
        });
    </script>
</body>

</html>
