<!DOCTYPE html>
<html ng-app="validationApp">

<head>
    <title>Angular JS</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="ValidationController">
    <div ng-show="!showform">
        <form name="userForm" ng-submit="submitForm()" novalidate>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" ng-model="name" ng-pattern="/^[a-zA-Z\s]*$/" required><br><br>
            <div ng-show="userForm.name.$touched && userForm.name.$error.pattern" class="error">Name should contain only
                characters.</div>
            <label for="mobile">Mobile Number:</label>
            <input type="text" id="mobile" name="mobile" ng-model="mobile" ng-pattern="/^\d{10}$/" required><br><br>
            <div ng-show="userForm.mobile.$touched && userForm.mobile.$error.pattern" class="error">Mobile number should
                contain exactly 10 digits.</div>
            <label for="pincode">Pin Code:</label>
            <input type="text" id="pincode" name="pincode" ng-model="pincode" ng-pattern="/^\d{6}$/" required><br><br>
            <div ng-show="userForm.pincode.$touched && userForm.pincode.$error.pattern" class="error">Pin code should
                contain exactly 6 digits.</div>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" ng-model="email" required><br><br>
            <div ng-show="userForm.email.$touched && userForm.email.$error.email" class="error">Invalid email format.
            </div>
            <button type="submit" ng-disabled="userForm.$invalid">Submit</button>
        </form>
    </div>
    <div ng-show="showform">
        <h1>Employee Information </h1>
        <p><strong>Name:</strong> {{ name }}</p>
        <p><strong>Mobile Number:</strong> {{ mobile}}</p>
        <p><strong>Pincode:</strong> {{ pincode }}</p>
        <p><strong>Email Address:</strong> {{ email }}</p>
    </div>
    <script>
        var app = angular.module('validationApp', []);
        app.controller('ValidationController', function ($scope) {
            $scope.showform = false;
            $scope.submitForm = function () {
                if ($scope.userForm.$valid) {
                    alert('Form submitted successfully!');
                }
                $scope.showform = true;
            };
        });
    </script>
</body>

</html>
